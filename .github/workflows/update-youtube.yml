name: Update YouTube Videos

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * *"

permissions:
  contents: write

jobs:
  update-youtube:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest YouTube uploads
        run: node scripts/update-youtube.mjs
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_CHANNEL_URL: ${{ vars.YOUTUBE_CHANNEL_URL }}
          MAX_RESULTS: "9"

      - name: Commit updated video data
        run: |
          if git diff --quiet -- data/youtube-videos.json; then
            echo "No YouTube data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/youtube-videos.json
          git commit -m "Update YouTube video feed"
          git push
